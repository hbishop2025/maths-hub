<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SJWMS Maths | Login</title>

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>

  <style type="text/tailwindcss">
    body { @apply bg-[#020617] text-[#212121] font-[Lexend] overflow-x-hidden; }

    /* --- ENTRANCE ANIMATIONS --- */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }
    .delay-400 { animation-delay: 400ms; }
    .delay-500 { animation-delay: 500ms; }
  </style>
</head>
<body>

  <main class="relative w-full min-h-screen flex flex-col justify-center bg-[#020617] py-12 md:py-16 min-[1400px]:py-20">
    
    <div class="absolute inset-0 z-0 overflow-hidden">
      <img src="assets/chuttersnap-9G1kXjqOq4U-unsplash.jpg" alt="Maths Revision" class="w-full h-full object-cover object-center filter brightness-[0.60]" />
      <div class="absolute inset-0 bg-gradient-to-r from-[#020617]/80 via-[#0f172a]/50 to-transparent"></div>
    </div>

    <div class="relative z-10 w-full max-w-7xl mx-auto px-6 md:px-10 min-[1400px]:px-16 flex flex-col lg:flex-row items-center justify-center gap-10 min-[1400px]:gap-20 text-left">
      
      <div class="w-full max-w-xl min-[1400px]:max-w-2xl">
         
         <div class="flex items-center gap-2 min-[1400px]:gap-3 mb-4 min-[1400px]:mb-6 animate-fade-in delay-100">
           <img src="assets/hub_logo.png" alt="SJWMS" class="h-6 md:h-8 min-[1400px]:h-10 w-auto filter drop-shadow-lg"/>
           <span class="font-extrabold tracking-tight text-white text-base md:text-lg min-[1400px]:text-2xl drop-shadow-md">SJWMS Maths</span>
         </div>
         
         <h1 class="text-4xl lg:text-5xl min-[1400px]:text-7xl font-black text-white mb-4 min-[1400px]:mb-6 leading-tight drop-shadow-xl animate-fade-in delay-200">
           <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">
             SJWMS KS3
           </span><br>
           Textbook
         </h1>
         
         <p class="text-slate-300 text-sm md:text-base min-[1400px]:text-xl font-medium drop-shadow-md mb-6 min-[1400px]:mb-10 leading-relaxed max-w-lg animate-fade-in delay-300">
           Access your digital textbook resources, custom dashboards, and performance tracking profiles.
         </p>

         <div class="flex flex-wrap items-center gap-2 min-[1400px]:gap-4 animate-fade-in delay-400">
           <a href="index.html" class="group inline-flex items-center gap-2 px-4 py-2 min-[1400px]:px-6 min-[1400px]:py-3 rounded bg-blue-500/20 border border-blue-400/30 backdrop-blur-sm shadow-lg hover:bg-blue-500/40 hover:border-blue-400/50 hover:-translate-y-0.5 transition-all duration-300">
             <span class="material-icons text-blue-200 text-sm md:text-base group-hover:text-white transition-colors">arrow_back</span>
             <span class="text-[10px] md:text-xs min-[1400px]:text-sm font-bold text-blue-200 uppercase tracking-widest group-hover:text-white transition-colors">Back to Home</span>
           </a>
         </div>

         <div class="mt-12 min-[1400px]:mt-16 flex items-center gap-1.5 min-[1400px]:gap-2 text-slate-400/80 animate-fade-in delay-500">
           <span class="material-icons text-[12px] min-[1400px]:text-[16px] text-white">camera</span>
           <p class="text-[10px] md:text-xs min-[1400px]:text-sm font-medium tracking-wide">Background by <a href="https://unsplash.com/@chuttersnap?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText" class="hover:text-white transition-colors">CHUTTERSNAP</a></p>
         </div>

      </div>

      <div class="w-full max-w-md lg:w-[380px] min-[1400px]:w-[440px] shrink-0 flex flex-col gap-4 p-6 min-[1400px]:p-8 rounded-xl border border-white/20 bg-white/5 backdrop-blur-md shadow-2xl animate-fade-in delay-400 z-20">
        
        <div class="flex flex-col mb-2">
          <h2 class="text-xl min-[1400px]:text-2xl font-bold text-white tracking-wide">Sign In</h2>
          <p class="text-xs text-slate-400 mt-1">Please enter your credentials to access the KS3 Textbook.</p>
        </div>

        <div class="flex flex-col gap-1.5">
          <label class="text-[10px] min-[1400px]:text-xs font-bold text-blue-300 uppercase tracking-widest">Username</label>
          <input type="text" placeholder="e.g. student@sjwms.org.uk" disabled class="w-full px-4 py-2.5 rounded bg-slate-900/40 border border-white/10 text-slate-300 text-sm focus:outline-none focus:border-blue-400/50 placeholder-slate-500 transition-colors cursor-not-allowed" />
        </div>

        <div class="flex flex-col gap-1.5 mb-2">
          <label class="text-[10px] min-[1400px]:text-xs font-bold text-blue-300 uppercase tracking-widest">Password</label>
          <input type="password" placeholder="••••••••" disabled class="w-full px-4 py-2.5 rounded bg-slate-900/40 border border-white/10 text-slate-300 text-sm focus:outline-none focus:border-blue-400/50 placeholder-slate-500 transition-colors cursor-not-allowed" />
        </div>

        <button type="button" class="w-full py-2.5 min-[1400px]:py-3 rounded bg-blue-500/30 border border-blue-400/40 text-blue-200 text-xs min-[1400px]:text-sm font-bold uppercase tracking-widest shadow-lg hover:bg-blue-500/50 hover:text-white transition-all duration-300">
          Login
        </button>

        <div class="relative flex py-2 items-center">
          <div class="flex-grow border-t border-white/10"></div>
          <span class="flex-shrink mx-3 text-slate-400 text-[10px] font-bold uppercase tracking-widest">or</span>
          <div class="flex-grow border-t border-white/10"></div>
        </div>

        <button type="button" class="group w-full inline-flex items-center justify-center gap-3 py-2.5 min-[1400px]:py-3 rounded bg-white/5 border border-white/10 text-slate-300 text-xs min-[1400px]:text-sm font-bold uppercase tracking-widest hover:bg-white/10 hover:text-white hover:border-white/20 transition-all duration-300">
          <svg class="h-4 w-4 shrink-0 transition-transform group-hover:scale-105" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Login via Google
        </button>

      </div>

    </div>
  </main>

</body>
</html>
