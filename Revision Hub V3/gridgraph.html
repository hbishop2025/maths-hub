                State.refPoints.forEach(p => {
                    const sp = Utils.worldToScreen(p.pos.x, p.pos.y);
                    const isSelected = State.selectedIds.includes(p.id);
                    
                    ctx.beginPath();
                    ctx.moveTo(sp.x - 6, sp.y - 6);
                    ctx.lineTo(sp.x + 6, sp.y + 6);
                    ctx.moveTo(sp.x - 6, sp.y + 6);
                    ctx.lineTo(sp.x + 6, sp.y - 6);
                    
                    ctx.strokeStyle = isSelected ? '#ffffff' : p.color;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                });

                ctx.restore();
            },

            drawInfiniteLines: () => {
                if (State.lines.length === 0) return;
                const ctx = Canvas.ctx;
                const width = Canvas.width; const height = Canvas.height;
                ctx.save();

                const leftW = Utils.screenToWorld(0, 0).x;
                const rightW = Utils.screenToWorld(width, 0).x;
                const topW = Utils.screenToWorld(0, 0).y;
                const bottomW = Utils.screenToWorld(0, height).y;

                for (let line of State.lines) {
                    const isSelected = State.selectedIds.includes(line.id);
                    ctx.lineWidth = isSelected ? 3 : 2;
                    ctx.strokeStyle = line.color + (isSelected ? 'FF' : 'CC');

                    ctx.beginPath();
                    if (line.isVertical) {
                        let p1 = Utils.worldToScreen(line.xVal, topW);
                        let p2 = Utils.worldToScreen(line.xVal, bottomW);
                        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                    } else {
                        let yLeft = line.m * leftW + line.c;
                        let yRight = line.m * rightW + line.c;
                        let p1 = Utils.worldToScreen(leftW, yLeft);
                        let p2 = Utils.worldToScreen(rightW, yRight);
                        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                    }
                    ctx.stroke();
                }
                ctx.restore();
            },

            drawAngles: () => {
                if (State.lines.length < 2) return;
                const ctx = Canvas.ctx;
                ctx.save();
                for (let i = 0; i < State.lines.length; i++) {
                    for (let j = i + 1; j < State.lines.length; j++) {
                        let L1 = State.lines[i]; let L2 = State.lines[j];
                        if (L1.isVertical && L2.isVertical) continue;
                        if (!L1.isVertical && !L2.isVertical && Math.abs(L1.m - L2.m) < 0.0001) continue;
                        
                        let intX, intY;
                        if (L1.isVertical) { intX = L1.xVal; intY = L2.m * intX + L2.c; }
                        else if (L2.isVertical) { intX = L2.xVal; intY = L1.m * intX + L1.c; }
                        else { intX = (L2.c - L1.c) / (L1.m - L2.m); intY = L1.m * intX + L1.c; }
                        
                        let isx = Utils.worldToScreen(intX, intY);
                        if (isx.x < -50 || isx.x > Canvas.width + 50 || isx.y < -50 || isx.y > Canvas.height + 50) continue;
                        
                        let d1 = L1.isVertical ? {x: 0, y: 1} : {x: 1, y: L1.m};
                        let d2 = L2.isVertical ? {x: 0, y: 1} : {x: 1, y: L2.m};
                        let sx1 = Utils.worldToScreen(intX + d1.x, intY + d1.y);
                        let sx2 = Utils.worldToScreen(intX + d2.x, intY + d2.y);
                        let screenAngle1 = Math.atan2(sx1.y - isx.y, sx1.x - isx.x);
                        let screenAngle2 = Math.atan2(sx2.y - isx.y, sx2.x - isx.x);
                        
                        let angles = [
                            screenAngle1, screenAngle1 + Math.PI, screenAngle2, screenAngle2 + Math.PI
                        ].map(a => (a % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI)).sort((a, b) => a - b);
                         
                        for (let k = 0; k < 4; k++) {
                            let startAngle = angles[k];
                            let endAngle = angles[(k + 1) % 4];
                            if (k === 3) endAngle += 2 * Math.PI;
                            
                            let diff = endAngle - startAngle;
                            if (diff < 0.01) continue;
                            
                            let degValue = Math.round(diff * 180 / Math.PI * 10) / 10;
                            if (degValue >= 180) continue; 
                            
                            let isRightAngle = Math.abs(degValue - 90) < 0.5;
                            
                            ctx.beginPath();
                            if (isRightAngle) {
                                const size = 12;
                                let p1x = isx.x + size * Math.cos(startAngle);
                                let p1y = isx.y + size * Math.sin(startAngle);
                                let p2x = isx.x + Math.sqrt(2)*size * Math.cos(startAngle + diff/2);
                                let p2y = isx.y + Math.sqrt(2)*size * Math.sin(startAngle + diff/2);
                                let p3x = isx.x + size * Math.cos(endAngle);
                                let p3y = isx.y + size * Math.sin(endAngle);
                                ctx.moveTo(p1x, p1y); ctx.lineTo(p2x, p2y); ctx.lineTo(p3x, p3y);
                            } else {
                                ctx.arc(isx.x, isx.y, 20, startAngle, endAngle);
                            }
                            
                            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
                            
                            let midAngle = startAngle + diff / 2;
                            let tx = isx.x + 35 * Math.cos(midAngle);
                            let ty = isx.y + 35 * Math.sin(midAngle);
                            let degStr = Number.isInteger(degValue) ? degValue.toString() : degValue.toFixed(1);
                            
                            ctx.font = 'bold 10px monospace';
                            const textWidth = ctx.measureText(degStr + '°').width;
                            ctx.fillStyle = 'rgba(15, 23, 42, 0.7)';
                            ctx.fillRect(tx - textWidth/2 - 2, ty - 6, textWidth + 4, 12);
                            ctx.fillStyle = '#60a5fa'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                            ctx.fillText(degStr + '°', tx, ty);
                        }
                        
                        ctx.beginPath();
                        ctx.arc(isx.x, isx.y, 3, 0, 2*Math.PI);
                        ctx.fillStyle = '#ef4444'; ctx.fill();
                    }
                }
                ctx.restore();
            },

            drawShapes: () => {
                const ctx = Canvas.ctx;
                const width = Canvas.width; const height = Canvas.height;
                const pad = 50; 
                ctx.save();

                for (let shape of State.shapes) {
                    if (shape.points.length < 2) continue;
                    const screenPoints = shape.points.map(p => Utils.worldToScreen(p.x, p.y));
                    
                    let inBounds = screenPoints.some(sp => sp.x >= -pad && sp.x <= width+pad && sp.y >= -pad && sp.y <= height+pad);
                    if (!inBounds && screenPoints.length > 2) inBounds = true; 
                    
                    if (inBounds) {
                        ctx.beginPath();
                        ctx.moveTo(screenPoints[0].x, screenPoints[0].y);
                        for (let i = 1; i < screenPoints.length; i++) { ctx.lineTo(screenPoints[i].x, screenPoints[i].y); }
                        ctx.closePath();

                        const isSelected = State.selectedIds.includes(shape.id);
                        ctx.fillStyle = isSelected ? shape.color + '66' : shape.color + '33'; ctx.fill();
                        ctx.strokeStyle = shape.color; ctx.lineWidth = isSelected ? 3 : 2;
                        if (isSelected) { ctx.shadowColor = shape.color; ctx.shadowBlur = 10; }
                        ctx.stroke(); ctx.shadowBlur = 0;

                        if (!shape.isCircle) {
                            ctx.fillStyle = CONFIG.colors.bg; ctx.strokeStyle = shape.color; ctx.lineWidth = 2;
                            for (let sp of screenPoints) {
                                if (sp.x >= -pad && sp.x <= width+pad && sp.y >= -pad && sp.y <= height+pad) {
                                    ctx.beginPath(); ctx.arc(sp.x, sp.y, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                                }
                            }
                        }
                    }
                }
                ctx.restore();
            },

            drawAnimShapes: () => {
                const ctx = Canvas.ctx;
                ctx.save();
                for (let shape of State.animShapes) {
                    if (shape.points.length < 2) continue;
                    const screenPoints = shape.points.map(p => Utils.worldToScreen(p.x, p.y));
                    ctx.beginPath();
                    ctx.moveTo(screenPoints[0].x, screenPoints[0].y);
                    for (let i = 1; i < screenPoints.length; i++) { ctx.lineTo(screenPoints[i].x, screenPoints[i].y); }
                    ctx.closePath();

                    ctx.fillStyle = shape.color + '88'; ctx.fill();
                    ctx.strokeStyle = shape.color; ctx.lineWidth = 3;
                    ctx.shadowColor = shape.color; ctx.shadowBlur = 15; ctx.stroke(); ctx.shadowBlur = 0;

                    if (!shape.isCircle) {
                        ctx.fillStyle = '#fff';
                        for (let sp of screenPoints) {
                            ctx.beginPath(); ctx.arc(sp.x, sp.y, 4, 0, Math.PI * 2); ctx.fill();
                        }
                    }
                }
                ctx.restore();
            },

            drawActiveDrawing: () => {
                if (!State.isDrawing || State.currentDrawingPoints.length === 0) return;
                const ctx = Canvas.ctx;
                ctx.save();
                const screenPoints = State.currentDrawingPoints.map(p => Utils.worldToScreen(p.x, p.y));
                ctx.beginPath();
                ctx.moveTo(screenPoints[0].x, screenPoints[0].y);
                for (let i = 1; i < screenPoints.length; i++) { ctx.lineTo(screenPoints[i].x, screenPoints[i].y); }
                ctx.strokeStyle = CONFIG.colors.drawingLine; ctx.lineWidth = 2; ctx.stroke();

                ctx.fillStyle = CONFIG.colors.bg;
                for (let sp of screenPoints) {
                    ctx.beginPath(); ctx.arc(sp.x, sp.y, 4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                }
                if (screenPoints.length > 2) {
                    ctx.beginPath(); ctx.arc(screenPoints[0].x, screenPoints[0].y, 8, 0, Math.PI * 2);
                    ctx.strokeStyle = '#10b981'; ctx.stroke();
                }
                ctx.restore();
            },

            render: () => {
                Canvas.clear();
                Canvas.drawGrid();
                Canvas.drawGhosts();
                Canvas.drawShapes();
                Canvas.drawInfiniteLines(); 
                Canvas.drawRefObjects(); 
                if (State.showAngles) Canvas.drawAngles();
                Canvas.drawAnimShapes(); 
                Canvas.drawActiveDrawing();
                requestAnimationFrame(Canvas.render);
            }
        };

        window.onload = App.init;
    </script>
</body>
</html>
