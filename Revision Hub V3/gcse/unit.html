<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GCSE Topic | SJWMS Maths</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/main.css"/>
  <style>
    body { font-family: "Lexend", sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex h-14 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a href="/index.html" class="flex items-center gap-3 font-extrabold">
        <img src="/assets/hub_logo.png" alt="SJWMS" class="h-7 w-auto"/>
        <span>SJWMS Maths</span>
      </a>
      <nav class="flex items-center gap-5 text-sm font-semibold">
        <a href="/gcse_hub.html" class="text-blue-600">GCSE Hub</a>
        <a href="/gcse_topics.html" class="text-slate-600 hover:text-blue-600">All Topics</a>
      </nav>
    </div>
  </header>

  <main class="mx-auto min-h-[65vh] max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <a href="/gcse_topics.html" class="mb-6 inline-flex items-center text-sm font-semibold text-slate-600 hover:text-blue-600">
      <span class="material-icons mr-1 text-base">arrow_back</span>Back to GCSE topics
    </a>

    <section class="overflow-hidden rounded-3xl bg-gradient-to-br from-blue-600 via-indigo-600 to-violet-600 p-8 text-white shadow-xl md:p-12">
      <p id="unit-number" class="mb-2 text-xs font-bold uppercase tracking-[0.2em] text-blue-100"></p>
      <h1 id="unit-title" class="text-3xl font-black tracking-tight md:text-5xl"></h1>
      <p class="mt-3 max-w-2xl text-blue-100">Worksheets, videos and supporting resources for this GCSE topic.</p>
    </section>

    <section class="mt-10">
      <div id="resource-grid" class="grid gap-5 md:grid-cols-2 lg:grid-cols-3"></div>
      <p id="empty-state" class="rounded-2xl border border-slate-200 bg-white p-8 text-center text-slate-500">
        Resources for this topic are coming soon.
      </p>
    </section>
  </main>

  <div id="footer-slot"></div>
  <script>
    (() => {
      const topics = {
        11: "Compound Measures",
        12: "Congruence & Similarity",
        13: "More Trigonometry",
        14: "Further Statistics",
        15: "Equations & Graphs",
        16: "Circle Theorems",
        17: "More Algebra",
        18: "Vectors & Geometric Proofs",
        19: "Proportion & Graphs"
      };

      const requestedUnit = Number(new URLSearchParams(window.location.search).get("unit"));
      const unit = Object.hasOwn(topics, requestedUnit) ? requestedUnit : 11;
      const title = topics[unit];
      const unitId = String(unit).padStart(2, "0");

      document.title = `${title} | SJWMS Maths`;
      document.getElementById("unit-number").textContent = `GCSE Unit ${unitId}`;
      document.getElementById("unit-title").textContent = title;

      const safeExternalUrl = (value) => {
        try {
          const url = new URL(value);
          return ["http:", "https:"].includes(url.protocol) ? url.href : null;
        } catch {
          return null;
        }
      };

      fetch(`/assets/data/gcse_unit${unitId}.json`)
        .then((response) => response.ok ? response.json() : { items: [] })
        .then((data) => {
          const rows = Array.isArray(data) ? data : data.items || [];
          const items = rows.filter((item) => item?.title && safeExternalUrl(item.url) && item.active !== false);
          if (!items.length) return;

          const grid = document.getElementById("resource-grid");
          document.getElementById("empty-state").hidden = true;
          items.forEach((item) => {
            const link = document.createElement("a");
            link.href = safeExternalUrl(item.url);
            link.target = "_blank";
            link.rel = "noopener";
            link.className = "rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md";

            const label = document.createElement("p");
            label.className = "text-xs font-bold uppercase tracking-wider text-blue-600";
            label.textContent = item.blockkey || "Resource";

            const heading = document.createElement("h2");
            heading.className = "mt-2 font-bold text-slate-900";
            heading.textContent = item.title;

            link.append(label, heading);
            grid.appendChild(link);
          });
        })
        .catch(() => {});
    })();
  </script>
  <script src="/assets/footer-loader.js" defer></script>
</body>
</html>
