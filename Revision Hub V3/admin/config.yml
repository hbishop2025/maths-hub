backend:
  name: git-gateway
  repo: hbishop2025/maths-hub
  branch: main

site_url: /
logo_url: /assets/cms-logo.svg

media_folder: "assets/media"
public_folder: "/assets/media"

publish_mode: simple

editor:
  preview: false

collections:
    # =========================== KS3 EOY (End of Year) ===========================
  - name: "ks3_eoy"
    label: "KS3 EOY Content"
    files:

      # --- EOY resources (feeds Year 7/8/9 resource grids) ---
      - file: "Revision Hub V3/assets/data/ks3_eoy_resources.json"
        label: "EOY Resources"
        name: "ks3_eoy_resources"
        format: json
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{fields.year}} – {{fields.title}}"
            fields:
              - label: "Year"
                name: "year"
                widget: "select"
                options:
                  - { label: "Year 7", value: "y7" }
                  - { label: "Year 8", value: "y8" }
                  - { label: "Year 9", value: "y9" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - label: "Type"
                name: "type"
                widget: "select"
                required: false
                options: ["pdf", "video", "quiz", "site", "other"]
              - { label: "Description", name: "description", widget: "text", required: false }
              # Optional: helps sort newest first on the page if present
              - { label: "Date (YYYY-MM-DD)", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }
              - { label: "Active", name: "active", widget: "boolean", default: true }
              
  # Year 7
  - name: "year7"
    label: "Year 7 Resources"
    files:
      - name: "year7_unit01"
        label: "Year 7 — Unit 01"
        file: "Revision Hub V3/assets/data/year7_unit01.json"
        format: json
        fields: &year7_fields
          - label: "Items"
            name: "items"
            widget: "list"
            label_singular: "Resource"
            summary: "{{fields.blockkey}} — {{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
              - { label: "Block", name: "blockkey", widget: "select", options: ["worksheets","videos","other"] }
              - { label: "Date Added", name: "addediso", widget: "datetime" }
              - { label: "Active", name: "active", widget: "boolean", default: true }

          # NEW: SPARX codes for optional practice
          - label: "SPARX Codes"
            name: "sparx_codes"
            widget: "list"
            label_singular: "SPARX Code"
            summary: "{{fields.code}}"
            collapsed: false
            hint: "Add SPARX practice codes for this unit (optional). Leave empty to hide the section."
            fields:
              - label: "Code"
                name: "code"
                widget: "string"
                hint: "e.g. ABC123 (letters/numbers, usually 6 chars)"
                pattern:
                  - "^[A-Za-z0-9]{4,8}$"
                  - "Use 4–8 letters/numbers"
              - { label: "Note (optional)", name: "note", widget: "string", required: false }


      - name: "year7_unit02"
        label: "Year 7 — Unit 02"
        file: "Revision Hub V3/assets/data/year7_unit02.json"
        format: json
        fields: *year7_fields

